name: Bug Report & Feature Request
description: Report a bug or request a new feature
title: ""
labels: []
projects: ["Issue Tracker (PDF)"]

body:
  - type: dropdown
    id: issue_type
    attributes:
      label: Issue Type
      description: What type of issue are you reporting?
      options:
        - Bug Report
        - Feature Request
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Bug Report Section
        **Complete this section if you selected "Bug Report" above**

  - type: textarea
    id: bug_description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug you encountered. (Only fill this if reporting a bug)
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the steps we can follow to reproduce the bug.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
        (Only fill this if reporting a bug)
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: A clear and concise description of the expected outcome. (Only fill this if reporting a bug)
    validations:
      required: false

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: A clear and concise description of what actually happened. (Only fill this if reporting a bug)
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ## Feature Request Section
        **Complete this section if you selected "Feature Request" above**

  - type: textarea
    id: related_problem
    attributes:
      label: Related Problem
      description: Is your feature request related to a problem? Please describe.
      placeholder: A clear and concise description of what the problem is. Ex. I'm always frustrated when... (Only fill this if requesting a feature)
    validations:
      required: false

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
      placeholder: A clear and concise description of what you want to happen. (Only fill this if requesting a feature)
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe alternative solutions or features you've considered.
      placeholder: Other ideas that might solve the same problem. (Only fill this if requesting a feature)
    validations:
      required: false

  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: How would this feature be used? Who benefits from it?
      placeholder: Explain how this feature would fit into real-world workflows. (Only fill this if requesting a feature)
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority (Feature Requests Only)
      description: How important is this feature to you?
      options:
        - Not applicable (this is a bug report)
        - Low - Nice to have
        - Medium - Would improve workflow
        - High - Critical for my use case
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ## System Information
        **Complete this section regardless of issue type**

  - type: input
    id: app_version
    attributes:
      label: Application Version
      description: Which version of the application are you using?
      placeholder: e.g., 1.0.0
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      description: What operating system are you using?
      placeholder: e.g., Windows 11
    validations:
      required: false

  - type: input
    id: python_version
    attributes:
      label: Python Version
      description: Which version of Python are you using?
      placeholder: e.g., 3.11.0
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Log Files (Bugs) / Screenshots (Features)
      description: If applicable, paste or attach log output or screenshots here.
      placeholder: Copy-paste relevant logs or attach screenshots here.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context about the problem or feature request here.
      placeholder: Any extra notes or details.
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ## Program Unique ID
        - **ID**: []  
        **Program ID is only for programs with the ability to report issues.**

  - type: input
    id: program_unique_id
    attributes:
      label: Program Unique ID (optional)
      description: If this was reported from a program that provides an ID, paste it here.
      placeholder: e.g., PRG-12345
    validations:
      required: false