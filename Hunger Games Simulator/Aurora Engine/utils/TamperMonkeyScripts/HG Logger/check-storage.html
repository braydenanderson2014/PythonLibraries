<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Storage Inspector</title>
    <style>
        body { font-family: monospace; background: #1a1a1a; color: #0f0; padding: 20px; }
        .section { background: #2a2a2a; padding: 15px; margin: 10px 0; border: 2px solid #0f0; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #000; padding: 10px; overflow-x: auto; border: 1px solid #0f0; }
        .error { color: #f00; }
        .success { color: #0f0; }
    </style>
</head>
<body>
    <h1>📦 TamperMonkey Storage Inspector</h1>
    
    <div class="section">
        <h2>All Stored Keys</h2>
        <button onclick="listAllKeys()">List All Keys</button>
        <pre id="keys-output"></pre>
    </div>
    
    <div class="section">
        <h2>Collector Storage</h2>
        <button onclick="inspectCollectorStorage()">Inspect Collector Data</button>
        <pre id="collector-output"></pre>
    </div>
    
    <div class="section">
        <h2>Dashboard Config</h2>
        <button onclick="inspectDashboardConfig()">Inspect Dashboard Config</button>
        <pre id="config-output"></pre>
    </div>
    
    <div class="section">
        <h2>Raw GM Storage Dump</h2>
        <button onclick="dumpRawStorage()">Dump Raw Storage</button>
        <pre id="raw-output"></pre>
    </div>
    
    <div class="section">
        <h2>Test Write</h2>
        <button onclick="testWrite()">Write Test Data</button>
        <pre id="test-output"></pre>
    </div>

    <script>
        function safeAccess(fn, fallback = {}) {
            try {
                return fn();
            } catch (e) {
                console.error(e);
                return fallback;
            }
        }

        function listAllKeys() {
            const output = document.getElementById('keys-output');
            output.textContent = 'Listing localStorage keys...\n\n';
            
            try {
                const keys = Object.keys(localStorage);
                output.textContent += 'Keys found: ' + keys.length + '\n';
                keys.forEach(key => {
                    output.textContent += '  - ' + key + '\n';
                });
            } catch (e) {
                output.textContent = 'Error: ' + e.message;
            }
        }

        function inspectCollectorStorage() {
            const output = document.getElementById('collector-output');
            output.textContent = '';
            
            try {
                const allLogs = JSON.parse(localStorage.getItem('hg_logger_all_logs') || '{}');
                const stats = JSON.parse(localStorage.getItem('hg_logger_stats') || '{}');
                
                output.textContent = 'Storage Key: hg_logger_all_logs\n';
                output.textContent += 'Type: ' + typeof allLogs + '\n';
                output.textContent += 'Sites stored: ' + Object.keys(allLogs).length + '\n\n';
                
                if (Object.keys(allLogs).length > 0) {
                    output.textContent += JSON.stringify(allLogs, null, 2);
                } else {
                    output.textContent += 'No logs stored yet.\n\nTry:\n1. Visit any website\n2. Check if [HG COLLECTOR] logs appear in console\n3. Return here and click button again';
                }
                
                output.textContent += '\n\n--- Stats ---\n';
                output.textContent += JSON.stringify(stats, null, 2);
            } catch (e) {
                output.textContent = 'Error: ' + e.message + '\n' + e.stack;
            }
        }

        function inspectDashboardConfig() {
            const output = document.getElementById('config-output');
            
            try {
                const config = JSON.parse(localStorage.getItem('hg_logger_config') || '{}');
                output.textContent = JSON.stringify(config, null, 2);
            } catch (e) {
                output.textContent = 'Error: ' + e.message;
            }
        }

        function dumpRawStorage() {
            const output = document.getElementById('raw-output');
            
            try {
                const keys = Object.keys(localStorage);
                const dump = {};
                keys.forEach(key => {
                    try {
                        dump[key] = JSON.parse(localStorage.getItem(key));
                    } catch {
                        dump[key] = localStorage.getItem(key);
                    }
                });
                
                output.textContent = 'Total keys: ' + keys.length + '\n\n';
                output.textContent += JSON.stringify(dump, null, 2);
            } catch (e) {
                output.textContent = 'Error: ' + e.message;
            }
        }

        function testWrite() {
            const output = document.getElementById('test-output');
            
            try {
                const testKey = 'hg_storage_test_' + Date.now();
                const testData = { test: true, timestamp: new Date().toISOString() };
                
                localStorage.setItem(testKey, JSON.stringify(testData));
                output.textContent = 'Wrote: ' + testKey + '\n';
                output.textContent += JSON.stringify(testData, null, 2) + '\n\n';
                
                const readBack = JSON.parse(localStorage.getItem(testKey));
                output.textContent += 'Read back:\n';
                output.textContent += JSON.stringify(readBack, null, 2);
                output.textContent += '\n✓ Write/Read test successful!';
            } catch (e) {
                output.textContent = 'Error: ' + e.message;
            }
        }

        // Auto-run on load
        setTimeout(() => {
            listAllKeys();
            inspectCollectorStorage();
        }, 500);
    </script>
</body>
</html>
